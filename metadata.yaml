name: 自动meme
desc: anka - 自动表情包 - 基于群聊语境主动发送表情包。支持滑动窗口机制、LLM智能语境分析、QQ群白名单等功能。
help: |
  功能包含：
  1. 基于群聊语境自动发送表情包（滑动窗口 + LLM分析）
  2. /表情管理 查看图库 - 列出所有可用表情类别
  3. /表情管理 添加表情 [类别] - 添加新表情到指定分类
  4. /表情管理 图库统计 - 显示图库详细统计信息
  
  配置说明：
  - 仅支持 aiocqhttp 适配器（QQ个人号）
  - 可配置 QQ 群白名单
  - 支持自定义 LLM 提示词
version: v4.1.3
author: anka,tianluoqaq
repo: https://github.com/tianlovo/astrbot_plugin_auto_meme
